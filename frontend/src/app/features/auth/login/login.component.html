<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">{{ 'auth.login.title' | translate }}</h1>

    @if (error()) {
      <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()" #form="ngForm" class="space-y-4">
      <div>
        <label for="email" class="block text-sm text-gray-600 mb-1">{{ 'auth.fields.email' | translate }}</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="email"
          class="w-full px-3 py-2 bg-white border border-gray-300 rounded-lg text-gray-900 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label for="password" class="block text-sm text-gray-600 mb-1">{{ 'auth.fields.password' | translate }}</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
          class="w-full px-3 py-2 bg-white border border-gray-300 rounded-lg text-gray-900 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading() || !form.valid"
        class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-lg transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500"
      >
        {{ loading() ? ('auth.login.loading' | translate) : ('auth.login.submit' | translate) }}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      {{ 'auth.login.noAccount' | translate }}
      <a routerLink="/register" class="text-blue-600 hover:text-blue-800 ml-1">{{ 'auth.login.register' | translate }}</a>
    </p>
  </div>
</div>
