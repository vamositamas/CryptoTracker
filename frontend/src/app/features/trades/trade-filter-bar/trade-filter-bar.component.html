<form [formGroup]="form" class="flex flex-wrap items-center gap-3 bg-white rounded-xl border border-gray-200 px-4 py-3">

  <!-- Token dropdown -->
  <div class="relative">
    <label
      for="filter-position"
      class="absolute -top-2 left-2.5 bg-white px-1 text-xs font-medium text-gray-500 z-10"
    >{{ 'trades.filters.token' | translate }}</label>
    <select
      id="filter-position"
      formControlName="position"
      class="h-10 min-w-36 rounded-lg border border-gray-300 bg-white pl-3 pr-8 text-sm text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:border-blue-500 transition-colors appearance-none cursor-pointer"
    >
      <option value="">{{ 'trades.filters.tokenAll' | translate }}</option>
      @for (token of tokens(); track token) {
        <option [value]="token">{{ token }}</option>
      }
    </select>
    <svg class="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </div>

  <!-- Position dropdown (Long / Short) -->
  <div class="relative">
    <label
      for="filter-trade-position"
      class="absolute -top-2 left-2.5 bg-white px-1 text-xs font-medium text-gray-500 z-10"
    >{{ 'trades.filters.tradePosition' | translate }}</label>
    <select
      id="filter-trade-position"
      formControlName="tradePosition"
      class="h-10 min-w-36 rounded-lg border border-gray-300 bg-white pl-3 pr-8 text-sm text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:border-blue-500 transition-colors appearance-none cursor-pointer"
    >
      <option value="">{{ 'trades.filters.tradePositionAll' | translate }}</option>
      @for (pos of positions(); track pos) {
        <option [value]="pos">{{ pos }}</option>
      }
    </select>
    <svg class="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </div>

  <!-- Result dropdown -->
  <div class="relative">
    <label
      for="filter-result"
      class="absolute -top-2 left-2.5 bg-white px-1 text-xs font-medium text-gray-500 z-10"
    >{{ 'trades.filters.result' | translate }}</label>
    <select
      id="filter-result"
      formControlName="result"
      class="h-10 min-w-36 rounded-lg border border-gray-300 bg-white pl-3 pr-8 text-sm text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:border-blue-500 transition-colors appearance-none cursor-pointer"
    >
      <option value="">{{ 'trades.filters.resultAll' | translate }}</option>
      <option value="Win">{{ 'trades.filters.resultWin' | translate }}</option>
      <option value="Loss">{{ 'trades.filters.resultLoss' | translate }}</option>
    </select>
    <svg class="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </div>

  <!-- Type dropdown -->
  <div class="relative">
    <label
      for="filter-type"
      class="absolute -top-2 left-2.5 bg-white px-1 text-xs font-medium text-gray-500 z-10"
    >{{ 'trades.filters.type' | translate }}</label>
    <select
      id="filter-type"
      formControlName="type"
      class="h-10 min-w-36 rounded-lg border border-gray-300 bg-white pl-3 pr-8 text-sm text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:border-blue-500 transition-colors appearance-none cursor-pointer"
    >
      <option value="">{{ 'trades.filters.typeAll' | translate }}</option>
      @for (t of types(); track t) {
        <option [value]="t">{{ t }}</option>
      }
    </select>
    <svg class="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </div>

  <!-- Date range -->
  <div class="relative">
    <label
      for="filter-date-from"
      class="absolute -top-2 left-2.5 bg-white px-1 text-xs font-medium text-gray-500 z-10"
    >{{ 'trades.filters.from' | translate }}</label>
    <input
      id="filter-date-from"
      type="date"
      formControlName="dateFrom"
      class="h-10 rounded-lg border border-gray-300 bg-white px-3 text-sm text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:border-blue-500 transition-colors"
    />
  </div>

  <div class="relative">
    <label
      for="filter-date-to"
      class="absolute -top-2 left-2.5 bg-white px-1 text-xs font-medium text-gray-500 z-10"
    >{{ 'trades.filters.to' | translate }}</label>
    <input
      id="filter-date-to"
      type="date"
      formControlName="dateTo"
      class="h-10 rounded-lg border border-gray-300 bg-white px-3 text-sm text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:border-blue-500 transition-colors"
    />
  </div>

  <!-- Clear filters -->
  @if (hasValues) {
    <button
      type="button"
      (click)="clearAll()"
      class="flex items-center gap-1.5 rounded-lg border border-gray-300 bg-white px-3 h-10 text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500"
    >
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 4h18M7 10h10M10 16h4" />
      </svg>
      {{ 'trades.filters.clearAll' | translate }}
    </button>
  }

</form>
