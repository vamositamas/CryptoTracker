<div class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="w-full max-w-md px-4">
    <h1 class="text-2xl font-semibold text-gray-900 text-center mb-8">Select your profile</h1>

    @if (loading()) {
      <p class="text-center text-gray-500">Loading profiles…</p>
    } @else if (error()) {
      <p class="text-center text-red-600">{{ error() }}</p>
    } @else {
      <ul class="space-y-3" role="list">
        @for (trader of traders(); track trader) {
          <li>
            <button
              type="button"
              (click)="selectTrader(trader)"
              class="w-full bg-white border border-gray-200 rounded-lg p-6 text-center text-gray-900 font-medium hover:border-blue-500 hover:shadow-md cursor-pointer transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2"
            >{{ trader }}</button>
          </li>
        }
      </ul>
    }
  </div>
</div>
