<main id="main-content" class="px-4 py-6 max-w-7xl mx-auto space-y-6">
  <h1 class="text-2xl font-bold text-gray-900">{{ 'dashboard.title' | translate }}</h1>

  <!-- Error state -->
  @if (!loading() && error()) {
    <div
      class="rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"
      role="alert"
    >
      {{ error()! | translate }}
    </div>
  }

  <!-- Empty state -->
  @if (!loading() && !error() && isEmpty()) {
    <div class="text-center py-16">
      <p class="text-gray-400 text-base mb-2">{{ 'dashboard.empty.description' | translate }}</p>
      <a
        routerLink="/trades"
        class="inline-block text-blue-600 hover:text-blue-700 text-sm font-medium"
      >
        {{ 'dashboard.empty.goToTrades' | translate }}
      </a>
    </div>
  }

  <!-- KPI Cards -->
  @if (!isEmpty()) {
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
      <app-kpi-card
        [label]="'dashboard.kpis.totalTrades' | translate"
        [value]="totalTradesDisplay()"
        colorVariant="neutral"
        [loading]="loading()"
      />
      <app-kpi-card
        [label]="'dashboard.kpis.totalNetProfit' | translate"
        [value]="totalNetProfitDisplay()"
        [colorVariant]="totalNetProfitColor()"
        [loading]="loading()"
      />
      <app-kpi-card
        [label]="'dashboard.kpis.bestSingleTrade' | translate"
        [value]="bestSingleTradeDisplay()"
        colorVariant="positive"
        [loading]="loading()"
      />
      <app-kpi-card
        [label]="'dashboard.kpis.winRate' | translate"
        [value]="winRateDisplay()"
        [colorVariant]="winRateColor()"
        [loading]="loading()"
      />
    </div>

    <!-- Monthly Table -->
    <app-monthly-table
      [data]="monthly()"
      [loading]="loading()"
    />
  }
</main>
