<div class="p-6 max-w-2xl">
  <h1 class="text-xl font-semibold text-gray-900 mb-2">{{ 'profile.title' | translate }}</h1>
  <p class="text-sm text-gray-500 mb-6">{{ 'profile.description' | translate }}</p>

  @if (error()) {
    <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm">{{ error() }}</div>
  }

  @if (success()) {
    <div class="mb-4 px-4 py-3 rounded-lg bg-green-50 border border-green-200 text-green-700 text-sm">{{ 'profile.success.saved' | translate }}</div>
  }

  <form (ngSubmit)="save()" #form="ngForm" class="space-y-4 bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
    <div>
      <label for="email" class="block text-xs text-gray-500 mb-1">{{ 'profile.fields.email' | translate }}</label>
      <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="email"
        required
        autocomplete="email"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"
      />
    </div>

    <div>
      <label for="username" class="block text-xs text-gray-500 mb-1">{{ 'profile.fields.username' | translate }}</label>
      <input
        id="username"
        type="text"
        name="username"
        [(ngModel)]="username"
        required
        autocomplete="username"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"
      />
    </div>

    <div>
      <label for="newPassword" class="block text-xs text-gray-500 mb-1">{{ 'profile.fields.newPassword' | translate }}</label>
      <input
        id="newPassword"
        type="password"
        name="newPassword"
        [(ngModel)]="newPassword"
        minlength="8"
        autocomplete="new-password"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"
      />
      <p class="mt-1 text-xs text-gray-500">{{ 'profile.hints.passwordOptional' | translate }}</p>
    </div>

    <div class="pt-2">
      <button
        type="submit"
        [disabled]="loading() || !form.valid"
        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white text-sm rounded-lg"
      >
        {{ loading() ? ('profile.actions.saving' | translate) : ('profile.actions.save' | translate) }}
      </button>
    </div>
  </form>
</div>
