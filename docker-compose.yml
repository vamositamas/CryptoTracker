services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      # Persist trade data on the host — survives container restarts
      - ./data:/data
    environment:
      NODE_ENV: production
      PORT: 3001
      DATA_DIR: /data
      JWT_SECRET: change-me-in-production-use-a-long-random-string
      JWT_EXPIRES_IN: 24h
    ports:
      - "3001:3001"
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
